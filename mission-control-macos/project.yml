name: MissionControl
options:
  bundleIdPrefix: com.jarvis
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  MissionControl:
    type: application
    platform: macOS
    sources:
      - MissionControl.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.missioncontrol
        PRODUCT_NAME: Mission Control
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
